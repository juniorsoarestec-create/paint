<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Desenho Kids</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Comic Sans MS',cursive;background:linear-gradient(135deg,#fff0f5,#f0f4ff);min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{background:linear-gradient(90deg,#ff6eb4,#a78bfa,#60c8f5);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 12px rgba(0,0,0,.2);}
header h1{color:#fff;font-size:1.5rem;text-shadow:2px 2px 0 rgba(0,0,0,.15);}
.hstar{font-size:1.4rem;}

/* TABS */
.tabs{display:flex;justify-content:center;gap:10px;padding:12px;background:rgba(255,255,255,.7);}
.tab-btn{padding:8px 22px;border:none;border-radius:30px;font-family:inherit;font-size:1rem;font-weight:bold;cursor:pointer;background:#e2e8f0;color:#555;transition:all .2s;}
.tab-btn.active{background:linear-gradient(135deg,#ff6eb4,#a78bfa);color:#fff;box-shadow:0 4px 14px rgba(167,139,250,.5);transform:scale(1.05);}

/* PAGES */
.page{display:none;padding:14px;}
.page.active{display:block;}

/* ── DRAW PAGE ── */
#page-draw{display:flex;flex-direction:column;align-items:center;gap:12px;padding:14px;}
#page-draw.active{display:flex;}

.toolbar{background:#fff;border-radius:20px;padding:12px 16px;box-shadow:0 4px 16px rgba(0,0,0,.1);display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;max-width:700px;width:100%;}

/* tool buttons */
.tool-btn{width:44px;height:44px;border:3px solid transparent;border-radius:12px;font-size:1.4rem;cursor:pointer;background:#f1f5f9;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.tool-btn:hover{background:#e2e8f0;transform:scale(1.1);}
.tool-btn.active{border-color:#a78bfa;background:#ede9fe;transform:scale(1.1);}

/* color grid */
.color-grid{display:flex;flex-wrap:wrap;gap:5px;max-width:200px;}
.swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;flex-shrink:0;}
.swatch:hover{transform:scale(1.2);}
.swatch.picked{border-color:#1e293b;transform:scale(1.25);box-shadow:0 0 0 2px #fff,0 0 0 4px #1e293b;}

input[type=color]{width:36px;height:36px;border:none;border-radius:50%;cursor:pointer;padding:2px;background:#f1f5f9;}
input[type=range]{width:80px;accent-color:#a78bfa;cursor:pointer;}

.tg-label{font-size:.75rem;color:#94a3b8;font-weight:bold;text-align:center;}
.tg{display:flex;flex-direction:column;align-items:center;gap:4px;}
.tg-row{display:flex;gap:5px;align-items:center;}

/* canvas */
#canvas-wrap{position:relative;border-radius:20px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.18);touch-action:none;cursor:crosshair;}
#main-canvas{display:block;background:#fff;}

/* action buttons */
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.act-btn{padding:10px 18px;border:none;border-radius:30px;font-family:inherit;font-size:.9rem;font-weight:bold;cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(0,0,0,.12);}
.act-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.18);}
.btn-undo{background:#fde68a;color:#78350f;}
.btn-fill{background:#93c5fd;color:#1e3a5f;}
.btn-clear{background:#fca5a5;color:#7f1d1d;}
.btn-save{background:#6ee7b7;color:#064e3b;}

/* size dot preview */
#size-preview{width:30px;height:30px;display:flex;align-items:center;justify-content:center;}
#size-dot{background:#1e293b;border-radius:50%;transition:all .2s;}

/* ── TUTORIALS PAGE ── */
#page-tutorials{max-width:900px;margin:0 auto;}
.tut-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-top:4px;}
.tut-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.1);cursor:pointer;transition:all .2s;}
.tut-card:hover{transform:translateY(-5px);box-shadow:0 10px 26px rgba(0,0,0,.15);}
.tut-thumb{width:100%;height:120px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;}
.tut-info{padding:10px 14px 14px;}
.tut-info h3{font-size:1rem;color:#1e293b;}
.tut-diff{font-size:.78rem;color:#f59e0b;margin-top:2px;}

/* ── TUTORIAL MODAL ── */
#tut-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center;padding:16px;}
#tut-overlay.open{display:flex;}
.modal{background:#fff;border-radius:24px;max-width:500px;width:100%;padding:24px;position:relative;max-height:90vh;overflow-y:auto;}
.modal-close{position:absolute;top:14px;right:14px;background:#f1f5f9;border:none;border-radius:50%;width:34px;height:34px;font-size:1.1rem;font-weight:bold;cursor:pointer;color:#64748b;}
.modal-close:hover{background:#fca5a5;color:#7f1d1d;}
.modal h2{font-size:1.3rem;color:#1e293b;margin-bottom:8px;}
.step-dots{display:flex;gap:6px;margin:10px 0;}
.sdot{width:12px;height:12px;border-radius:50%;background:#e2e8f0;transition:all .2s;}
.sdot.active{background:#a78bfa;transform:scale(1.3);}
.sdot.done{background:#6ee7b7;}
#tut-canvas{display:block;width:100%;border-radius:12px;border:3px solid #e2e8f0;background:#fffaf0;}
.step-desc{font-size:.93rem;color:#475569;line-height:1.6;background:#f8fafc;border-radius:12px;padding:12px 14px;margin:10px 0;border-left:4px solid #a78bfa;}
.step-nav{display:flex;gap:10px;justify-content:center;margin-top:6px;}
.step-nav button{padding:10px 22px;border:none;border-radius:30px;font-family:inherit;font-size:.9rem;font-weight:bold;cursor:pointer;transition:all .2s;}
.btn-prev{background:#e2e8f0;color:#475569;}
.btn-prev:hover{background:#cbd5e1;}
.btn-next{background:linear-gradient(135deg,#ff6eb4,#a78bfa);color:#fff;box-shadow:0 4px 12px rgba(167,139,250,.4);}
.btn-next:hover{transform:scale(1.05);}
.btn-draw-it{display:block;width:100%;margin-top:10px;padding:12px;background:linear-gradient(135deg,#34d399,#60c8f5);border:none;border-radius:30px;font-family:inherit;font-size:1rem;font-weight:bold;color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(52,211,153,.4);transition:all .2s;}
.btn-draw-it:hover{transform:scale(1.03);}

/* ── GALLERY ── */
#page-gallery{max-width:900px;margin:0 auto;}
#page-gallery h2{text-align:center;color:#7c3aed;font-size:1.3rem;margin-bottom:14px;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.gitem{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.1);transition:all .2s;}
.gitem:hover{transform:translateY(-4px);}
.gitem img{width:100%;display:block;}
.gitem-footer{padding:7px 10px;display:flex;justify-content:space-between;align-items:center;}
.gitem-footer span{font-size:.75rem;color:#94a3b8;}
.del-btn{background:none;border:none;cursor:pointer;font-size:1rem;opacity:.5;}
.del-btn:hover{opacity:1;}
.empty-msg{text-align:center;color:#94a3b8;font-size:1.1rem;margin-top:40px;}

/* ── CONGRATS ── */
#congrats-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
#congrats-overlay.open{display:flex;}
.congrats-box{background:#fff;border-radius:30px;padding:40px 30px;text-align:center;max-width:300px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.congrats-box .big{font-size:3.5rem;}
.congrats-box h2{font-size:1.5rem;color:#7c3aed;margin:10px 0 6px;}
.congrats-box p{color:#64748b;margin-bottom:16px;}
.congrats-close{background:linear-gradient(135deg,#ff6eb4,#a78bfa);color:#fff;border:none;padding:12px 30px;border-radius:30px;font-family:inherit;font-size:1rem;font-weight:bold;cursor:pointer;}

@media(max-width:500px){
  header h1{font-size:1.1rem;}
  .tool-btn{width:38px;height:38px;font-size:1.1rem;}
  .swatch{width:24px;height:24px;}
  input[type=range]{width:60px;}
  .color-grid{max-width:168px;}
}
</style>
</head>
<body>

<header>
  <h1>✏️ Desenho Kids</h1>
  <span class="hstar">⭐🎨🌈</span>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="showPage('draw',this)">🖌️ Desenhar</button>
  <button class="tab-btn" onclick="showPage('tutorials',this)">📖 Tutoriais</button>
  <button class="tab-btn" onclick="showPage('gallery',this)">🖼️ Galeria</button>
</div>

<!-- ══ DRAW PAGE ══ -->
<div id="page-draw" class="page active" style="display:flex;flex-direction:column;align-items:center;gap:12px;">

  <div class="toolbar">

    <div class="tg">
      <span class="tg-label">Ferramenta</span>
      <div class="tg-row">
        <button class="tool-btn active" id="tbtn-pencil" title="Lápis" onclick="setTool('pencil',this)">✏️</button>
        <button class="tool-btn" id="tbtn-brush" title="Pincel" onclick="setTool('brush',this)">🖌️</button>
        <button class="tool-btn" id="tbtn-eraser" title="Borracha" onclick="setTool('eraser',this)">🩹</button>
      </div>
    </div>

    <div class="tg">
      <span class="tg-label">Tamanho</span>
      <div class="tg-row">
        <input type="range" id="size-range" min="2" max="60" value="8" oninput="setSize(this.value)"/>
        <div id="size-preview"><div id="size-dot" style="width:8px;height:8px;"></div></div>
      </div>
    </div>

    <div class="tg">
      <span class="tg-label">Opacidade</span>
      <input type="range" id="opacity-range" min="10" max="100" value="100" oninput="setOpacity(this.value)"/>
    </div>

    <div class="tg">
      <span class="tg-label">Cores</span>
      <div class="color-grid" id="color-grid"></div>
    </div>

    <div class="tg">
      <span class="tg-label">Custom</span>
      <input type="color" id="custom-color" value="#000000" title="Escolha uma cor" oninput="setCustomColor(this.value)"/>
    </div>

  </div>

  <div id="canvas-wrap">
    <canvas id="main-canvas"></canvas>
  </div>

  <div class="actions">
    <button class="act-btn btn-undo" onclick="undo()">↩️ Desfazer</button>
    <button class="act-btn btn-fill" onclick="fillBg()">🪣 Preencher</button>
    <button class="act-btn btn-clear" onclick="clearAll()">🗑️ Limpar</button>
    <button class="act-btn btn-save" onclick="saveImg()">💾 Salvar</button>
  </div>
</div>

<!-- ══ TUTORIALS PAGE ══ -->
<div id="page-tutorials" class="page">
  <div class="tut-grid" id="tut-grid"></div>
</div>

<!-- ══ GALLERY PAGE ══ -->
<div id="page-gallery" class="page">
  <h2>🌟 Meus Desenhos</h2>
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<!-- ══ TUTORIAL MODAL ══ -->
<div id="tut-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-title">Tutorial</h2>
    <div class="step-dots" id="step-dots"></div>
    <canvas id="tut-canvas" width="440" height="280"></canvas>
    <div class="step-desc" id="step-desc"></div>
    <div class="step-nav">
      <button class="btn-prev" onclick="prevStep()">◀ Voltar</button>
      <button class="btn-next" id="btn-next" onclick="nextStep()">Próximo ▶</button>
    </div>
    <button class="btn-draw-it" onclick="drawMyself()">🎨 Quero desenhar!</button>
  </div>
</div>

<!-- ══ CONGRATS ══ -->
<div id="congrats-overlay">
  <div class="congrats-box">
    <div class="big">🥳</div>
    <h2>Incrível!</h2>
    <p>Você terminou o tutorial! Agora é sua vez!</p>
    <button class="congrats-close" onclick="closeCongrats()">Vamos desenhar! 🎨</button>
  </div>
</div>

<script>
// ════════════════════════════════════
//  TABS
// ════════════════════════════════════
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.style.display = 'none';
  });
  const el = document.getElementById('page-' + id);
  el.style.display = (id === 'draw') ? 'flex' : 'block';
  el.classList.add('active');

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  if (id === 'gallery') renderGallery();
}

// ════════════════════════════════════
//  CANVAS SETUP
// ════════════════════════════════════
const canvas = document.getElementById('main-canvas');
const ctx    = canvas.getContext('2d');

function setupCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const maxW = Math.min(window.innerWidth - 32, 700);
  const h    = Math.round(maxW * (480 / 700));
  canvas.width  = maxW;
  canvas.height = h;
  canvas.style.width  = maxW + 'px';
  canvas.style.height = h + 'px';
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

setupCanvas();
window.addEventListener('resize', () => {
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  setupCanvas();
  ctx.putImageData(data, 0, 0);
});

// ════════════════════════════════════
//  DRAWING STATE
// ════════════════════════════════════
let tool    = 'pencil';
let color   = '#000000';
let brushSz = 8;
let opacity = 1.0;
let drawing = false;
let lastX   = 0;
let lastY   = 0;
let undoStack = [];

function getXY(e) {
  const r  = canvas.getBoundingClientRect();
  const sx = canvas.width  / r.width;
  const sy = canvas.height / r.height;
  const src = e.touches ? e.touches[0] : e;
  return [(src.clientX - r.left) * sx, (src.clientY - r.top) * sy];
}

function startDraw(e) {
  e.preventDefault();
  pushUndo();
  drawing = true;
  [lastX, lastY] = getXY(e);
  // draw a dot on click
  applyStroke(lastX, lastY, lastX, lastY);
}

function moveDraw(e) {
  if (!drawing) return;
  e.preventDefault();
  const [x, y] = getXY(e);
  applyStroke(lastX, lastY, x, y);
  [lastX, lastY] = [x, y];
}

function stopDraw(e) {
  drawing = false;
}

function applyStroke(x1, y1, x2, y2) {
  ctx.save();
  ctx.globalAlpha = (tool === 'eraser') ? 1 : opacity;
  ctx.strokeStyle = (tool === 'eraser') ? '#ffffff' : color;
  ctx.fillStyle   = (tool === 'eraser') ? '#ffffff' : color;
  ctx.lineWidth   = (tool === 'brush')  ? brushSz * 1.8 : brushSz;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';

  if (tool === 'brush') {
    ctx.shadowColor = color;
    ctx.shadowBlur  = brushSz * 0.7;
  }

  // dot
  if (x1 === x2 && y1 === y2) {
    ctx.beginPath();
    ctx.arc(x1, y1, ctx.lineWidth / 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  ctx.restore();
}

// mouse
canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mousemove',  moveDraw);
canvas.addEventListener('mouseup',    stopDraw);
canvas.addEventListener('mouseleave', stopDraw);

// touch
canvas.addEventListener('touchstart', startDraw, {passive:false});
canvas.addEventListener('touchmove',  moveDraw,  {passive:false});
canvas.addEventListener('touchend',   stopDraw);

// ════════════════════════════════════
//  UNDO
// ════════════════════════════════════
function pushUndo() {
  if (undoStack.length >= 30) undoStack.shift();
  undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
}

function undo() {
  if (!undoStack.length) return;
  ctx.putImageData(undoStack.pop(), 0, 0);
}

// ════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════
function fillBg() {
  pushUndo();
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.fillStyle   = color;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
}

function clearAll() {
  if (!confirm('Apagar tudo? 🗑️')) return;
  pushUndo();
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function saveImg() {
  const url    = canvas.toDataURL('image/png');
  const saved  = JSON.parse(localStorage.getItem('kidDrawings') || '[]');
  const date   = new Date().toLocaleDateString('pt-BR');
  saved.push({url, date});
  localStorage.setItem('kidDrawings', JSON.stringify(saved));

  const a = document.createElement('a');
  a.download = 'meu-desenho.png';
  a.href     = url;
  a.click();
  alert('🎉 Salvo na Galeria e baixado!');
}

// ════════════════════════════════════
//  TOOLS / COLOR / SIZE
// ════════════════════════════════════
function setTool(t, btn) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function setSize(v) {
  brushSz = parseInt(v);
  const px = Math.min(parseInt(v), 30);
  const dot = document.getElementById('size-dot');
  dot.style.width  = px + 'px';
  dot.style.height = px + 'px';
}

function setOpacity(v) { opacity = parseInt(v) / 100; }

function setColor(c) {
  color = c;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('picked'));
}

function setCustomColor(c) {
  color = c;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('picked'));
}

// ════════════════════════════════════
//  COLOR PALETTE
// ════════════════════════════════════
const COLORS = [
  '#000000','#ffffff','#ef4444','#f97316','#eab308',
  '#22c55e','#3b82f6','#a855f7','#ec4899','#6b7280',
  '#92400e','#0ea5e9','#fde68a','#bbf7d0','#fce7f3',
  '#7c3aed','#059669','#dc2626','#1d4ed8','#be185d'
];

const grid = document.getElementById('color-grid');
COLORS.forEach(c => {
  const s = document.createElement('div');
  s.className = 'swatch';
  s.style.background = c;
  if (c === '#ffffff') s.style.boxShadow = 'inset 0 0 0 1px #cbd5e1';
  s.onclick = () => {
    color = c;
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('picked'));
    s.classList.add('picked');
  };
  grid.appendChild(s);
});
// mark first as picked
grid.firstChild.classList.add('picked');

// ════════════════════════════════════
//  GALLERY
// ════════════════════════════════════
function renderGallery() {
  const gg   = document.getElementById('gallery-grid');
  const list = JSON.parse(localStorage.getItem('kidDrawings') || '[]');
  gg.innerHTML = '';
  if (!list.length) {
    gg.innerHTML = '<p class="empty-msg">Nenhum desenho ainda! Desenhe e salve 🎨</p>';
    return;
  }
  list.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'gitem';
    div.innerHTML = `
      <img src="${item.url}" alt="Desenho ${i+1}"/>
      <div class="gitem-footer">
        <span>${item.date}</span>
        <button class="del-btn" onclick="deleteDrawing(${i})" title="Apagar">🗑️</button>
      </div>`;
    gg.appendChild(div);
  });
}

function deleteDrawing(i) {
  const list = JSON.parse(localStorage.getItem('kidDrawings') || '[]');
  list.splice(i, 1);
  localStorage.setItem('kidDrawings', JSON.stringify(list));
  renderGallery();
}

// ════════════════════════════════════
//  TUTORIALS DATA
// ════════════════════════════════════
const TUTORIALS = [
  {
    title: '☀️ Sol Feliz',
    emoji: '☀️',
    bg:   'linear-gradient(135deg,#fef9c3,#fde68a)',
    diff: '⭐ Fácil',
    steps: [
      { desc: 'Vamos começar! Desenhe um círculo grande no meio do papel. Esse é o rosto do sol! 😊',
        draw(c,W,H){
          c.clearRect(0,0,W,H);
          c.strokeStyle='#f59e0b';c.lineWidth=4;
          c.beginPath();c.arc(W/2,H/2,70,0,Math.PI*2);c.stroke();
        }
      },
      { desc: 'Agora vamos desenhar os raios ao redor. São linhas saindo para fora do círculo! ✨',
        draw(c,W,H){
          c.strokeStyle='#f59e0b';c.lineWidth=4;
          for(let i=0;i<12;i++){
            const a=i*(Math.PI*2/12);
            c.beginPath();
            c.moveTo(W/2+80*Math.cos(a),H/2+80*Math.sin(a));
            c.lineTo(W/2+110*Math.cos(a),H/2+110*Math.sin(a));
            c.stroke();
          }
        }
      },
      { desc: 'Desenhe dois olhinhos e um sorriso grande! O sol está muito feliz! 😄',
        draw(c,W,H){
          const cx=W/2,cy=H/2;
          c.fillStyle='#92400e';
          c.beginPath();c.arc(cx-20,cy-14,7,0,Math.PI*2);c.fill();

//  RENDER TUTORIAL CARDS
// ════════════════════════════════════
const tutGrid = document.getElementById('tut-grid');
TUTORIALS.forEach(t => {
  const card = document.createElement('div');
  card.className = 'tut-card';
  card.innerHTML = `
    <div class="tut-thumb" style="background:${t.bg}">${t.emoji}</div>
    <div class="tut-info">
      <h3>${t.title}</h3>
      <p class="tut-diff">${t.diff}</p>
    </div>`;
  card.onclick = () => openTut(t);
  tutGrid.appendChild(card);
});

// ════════════════════════════════════
//  TUTORIAL MODAL
// ════════════════════════════════════
const tutOverlay = document.getElementById('tut-overlay');
const tutCanvas  = document.getElementById('tut-canvas');
const tutCtx     = tutCanvas.getContext('2d');
let curTut  = null;
let curStep = 0;

function openTut(t) {
  curTut  = t;
  curStep = 0;
  document.getElementById('modal-title').textContent = t.title;
  tutOverlay.classList.add('open');
  renderStep();
}

function closeModal() { tutOverlay.classList.remove('open'); }

function renderStep() {
  const steps = curTut.steps;
  const W     = tutCanvas.width;
  const H     = tutCanvas.height;

  // dots
  const dotsEl = document.getElementById('step-dots');
  dotsEl.innerHTML = '';
  steps.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'sdot' + (i < curStep ? ' done' : i === curStep ? ' active' : '');
    dotsEl.appendChild(d);
  });

  // description
  document.getElementById('step-desc').textContent = steps[curStep].desc;

  // draw cumulatively
  tutCtx.clearRect(0, 0, W, H);
  tutCtx.fillStyle = '#fffaf0';
  tutCtx.fillRect(0, 0, W, H);
  for (let i = 0; i <= curStep; i++) {
    steps[i].draw(tutCtx, W, H);
  }

  // next button label
  document.getElementById('btn-next').textContent =
    curStep === steps.length - 1 ? '✅ Concluir' : 'Próximo ▶';

  document.querySelector('.btn-prev').disabled = curStep === 0;
}

function nextStep() {
  if (curStep < curTut.steps.length - 1) {
    curStep++;
    renderStep();
  } else {
    closeModal();
    document.getElementById('congrats-overlay').classList.add('open');
  }
}

function prevStep() {
  if (curStep > 0) { curStep--; renderStep(); }
}

function drawMyself() {
  closeModal();
  showPage('draw', document.querySelectorAll('.tab-btn')[0]);
}
